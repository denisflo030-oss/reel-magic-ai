<!DOCTYPE html>
<html>
<head>
  <title>Reel Magic AI</title>
    <style>
        body {
                  font-family: Arial;
                        background: #0f0f0f;
                              color: white;
                                    text-align: center;
                                          padding: 30px;
        }

            .box {
                      border: 2px dashed #555;
                            padding: 20px;
                                  margin: 20px auto;
                                        width: 400px;
                                              border-radius: 10px;
            }

                input, button {
                          padding: 10px;
                                margin: 10px;
                                      width: 80%;
                }

                    button {
                              background: #00ff99;
                                    border: none;
                                          cursor: pointer;
                                                font-weight: bold;
                    }

                        .clip {
                                  background: #1a1a1a;
                                        margin: 10px;
                                              padding: 10px;
                                                    border-radius: 8px;
                        }
                          </style>
                          </head>

                          <body>

                          <h1>🎬 Reel Magic AI</h1>

                          <div class="box">
                            <h3>Upload Video</h3>
                              <input type="file" id="file" />
                                <button onclick="upload()">Upload & Analyze</button>
                                </div>

                                <div class="box">
                                  <h3>Or Video URL</h3>
                                    <input type="text" id="url" placeholder="Paste video URL..." />
                                      <button onclick="analyze()">Analyze</button>
                                      </div>

                                      <h2>Clips</h2>
                                      <div id="clips"></div>

                                      <script>
                                      async function upload() {
                                          const file = document.getElementById("file").files[0];
                                            const formData = new FormData();
                                              formData.append("video", file);

                                                const res = await fetch("/api/videos/upload", {
                                                        method: "POST",
                                                            body: formData
                                                });

                                                  const data = await res.json();
                                                    showClips(data.clips);
                                      }

                                      async function analyze() {
                                          const url = document.getElementById("url").value;

                                            const res = await fetch("/api/videos/analyze", {
                                                    method: "POST",
                                                        headers: { "Content-Type": "application/json" },
                                                            body: JSON.stringify({ url })
                                            });

                                              const data = await res.json();
                                                showClips(data.clips);
                                      }

                                      function showClips(clips) {
                                          const div = document.getElementById("clips");
                                            div.innerHTML = "";

                                              clips.forEach((c, i) => {
                                                    div.innerHTML += `
                                                          <div class="clip">
                                                                  <h4>Clip ${i+1}</h4>
                                                                          <p>${c.title || "AI Clip"}</p>
                                                                                  <a href="${c.download_url}" target="_blank">⬇ Download</a>
                                                                                        </div>
                                                                                            `;
                                              });
                                      }
                                      </script>

                                      </body>
                                      </html>
