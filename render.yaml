services:
  - type: web
    name: reel-magic-ai
    env: node
    plan: standard
    buildCommand: apt-get update && apt-get install -y ffmpeg yt-dlp && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    healthCheckInterval: 30
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: UPLOAD_DIR
        value: /tmp/reel-magic-uploads
