services:
  - type: web
    name: reel-magic-ai
    env: node
    plan: standard
    buildCommand: apt-get update && apt-get install -y ffmpeg && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
