services:
  - type: web
    name: reel-magic-ai
    env: node
    plan: standard
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVarsFile: .env
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
